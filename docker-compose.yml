version: '3.8'

services:
  app:
    build: .
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data
    user: root
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
